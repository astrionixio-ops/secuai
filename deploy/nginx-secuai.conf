# /etc/nginx/sites-available/secuai
# Domain: security.astrionix.io
#
# After installing:
#   sudo ln -s /etc/nginx/sites-available/secuai /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d security.astrionix.io

# --- Rate limiting zones (define once globally) ---
limit_req_zone $binary_remote_addr zone=secuai_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=secuai_auth:10m rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    server_name security.astrionix.io;

    # Certbot will rewrite this server block to redirect to HTTPS.
    # For pre-cert testing, we serve directly.

    root /var/www/secuai/public;
    index index.php;

    client_max_body_size 50M;
    server_tokens off;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP: tighten this once we know exact asset domains.
    # add_header Content-Security-Policy "default-src 'self'; ...";

    # --- API: proxy /api/* to PHP-FPM with rate limiting ---
    location /api/auth/ {
        limit_req zone=secuai_auth burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /api/ {
        limit_req zone=secuai_api burst=50 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- React SPA: served from /var/www/secuai-frontend/dist ---
    # Enable in Phase 5 when the frontend is deployed.
    # location / {
    #     root /var/www/secuai-frontend/dist;
    #     try_files $uri $uri/ /index.html;
    # }

    # --- Laravel default fallback ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60s;
    }

    # --- Hardening ---
    location ~ /\.(ht|env|git) { deny all; }
    location ~ ^/(storage|bootstrap)/ { deny all; }

    # --- Static assets caching ---
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # --- Logs ---
    access_log /var/log/nginx/secuai.access.log;
    error_log /var/log/nginx/secuai.error.log warn;
}
